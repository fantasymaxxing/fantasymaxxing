@media(max-width:600px){

.subtitle{font-size:13px}
.summary{grid-template-columns:repeat(2,1fr)}

const PC={
QB:{bg:"#fff3e0",tx:"#bf360c",bd:"#ffb74d"},
RB:{bg:"#e8f5e9",tx:"#1b5e20",bd:"#66bb6a"},
WR:{bg:"#e3f2fd",tx:"#0d47a1",bd:"#42a5f5"},
TE:{bg:"#f3e5f5",tx:"#4a148c",bd:"#ab47bc"},
};
const OPP={QB:"ATT",RB:"CAR",WR:"TGT",TE:"TGT"};
const maxPts=Math.max(...DATA.map(d=>d.pts));
const maxYds=Math.max(...DATA.map(d=>d.yds));
const maxTd=Math.max(...DATA.map(d=>d.td));

let currentPos="ALL", currentSort="rank", currentSearch="";

function bar(val,max,color){
const pct=Math.round((val/max)*100);
return `<div class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-val">${val.toLocaleString()}</span></div>`;
}

function render(){
const rows=DATA
.filter(p=>(currentPos==="ALL"||p.p===currentPos)&&
(p.n.toLowerCase().includes(currentSearch)||p.t.toLowerCase().includes(currentSearch)))
.sort((a,b)=>
currentSort==="name"?a.n.localeCompare(b.n):
currentSort==="pos"?a.p.localeCompare(b.p):
currentSort==="pts"?b.pts-a.pts:
currentSort==="yds"?b.yds-a.yds:
currentSort==="td"?b.td-a.td:
a.r-b.r);

document.getElementById("count").textContent=rows.length+" players";

if(!rows.length){
document.getElementById("table-body").innerHTML='<div class="empty">No players found.</div>';
return;
}

document.getElementById("table-body").innerHTML=rows.map((p,i)=>{
const pc=PC[p.p]||{bg:"#f5f5f5",tx:"#333",bd:"#ccc"};
const rankClass=p.r<=10?"elite":p.r<=25?"top":"";
const gpClass=p.gp>=16?"":"injured";
const oppLbl=OPP[p.p]||"OPP";
const tdPct=Math.round((p.td/maxTd)*100);
const bg=i%2===0?"#fff":"#fafaf8";
const noteHtml=p.note?`<span class="note-icon" title="${p.note.replace(/"/g,"'")}">!</span>`:"";
return `<div class="row" style="background:${bg}" onmouseover="this.style.background='#eef3ff'" onmouseout="this.style.background='${bg}'">
<div><span class="rank-num ${rankClass}">${p.r}</span></div>
<div class="name-wrap">
<div>
<div class="player-name">${p.n}</div>
<div class="player-team">${p.t}${noteHtml}</div>
</div>
</div>
<div><span class="pos-badge" style="background:${pc.bg};color:${pc.tx};border:1px solid ${pc.bd}">${p.p}</span></div>
<div class="gp-val ${gpClass}">${p.gp}</div>
${bar(p.pts,maxPts,"#e63946")}
${bar(p.yds,maxYds,"#1a73e8")}
<div class="td-cell"><div class="td-track"><div class="bar-fill" style="width:${tdPct}%;background:#27ae60"></div></div><span class="td-val">${p.td}</span></div>
<div class="opp-cell"><span class="opp-lbl">${oppLbl}</span><span class="opp-val">${p.opp}</span></div>
</div>`;
}).join("");
}

function renderSummary(){
document.getElementById("summary").innerHTML=["QB","RB","WR","TE"].map(p=>{
const pc=PC[p];
const group=DATA.filter(d=>d.p===p);
const avg=(group.reduce((a,d)=>a+d.pts,0)/group.length).toFixed(1);
return `<div class="sum-card" style="background:${pc.bg};border:1px solid ${pc.bd}" onclick="setPos('${p}')">
<div class="sum-num" style="color:${pc.tx}">${group.length}</div>
<div class="sum-pos" style="color:${pc.tx}">${p}s ranked</div>
<div class="sum-avg" style="color:${pc.tx}">${avg} avg PPR pts</div>
</div>`;
}).join("");
}

function setPos(p){
currentPos=p;
document.querySelectorAll(".pos-btn").forEach(btn=>{
const bp=btn.dataset.pos;
const pc=PC[bp];
if(bp===p){
if(bp==="ALL"){btn.style.cssText="border-color:#1a1a2e;background:#1a1a2e;color:#fff;font-weight:600";}
else{btn.style.cssText=`border:1.5px solid ${pc.bd};background:${pc.bg};color:${pc.tx};font-weight:600`;}
}else{btn.style.cssText="border:1px solid #ddd;background:#fff;color:#555;font-weight:400";}
});
render();
}

document.getElementById("updated").textContent=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
document.getElementById("search").addEventListener("input",e=>{currentSearch=e.target.value.toLowerCase();render();});
document.querySelectorAll(".pos-btn").forEach(btn=>btn.addEventListener("click",()=>setPos(btn.dataset.pos)));
document.querySelectorAll(".sort-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
currentSort=btn.dataset.sort;
document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
});
});

render();
renderSummary();
</script>
</body>
</html>
