<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fafaf8;padding:24px 16px}
#app{max-width:1040px;margin:0 auto}
.header{border-bottom:3px solid #1a1a2e;padding-bottom:16px;margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:42px;color:#1a1a2e;letter-spacing:1px;line-height:1}
.subtitle{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#e63946;letter-spacing:2px}
.navpills a{display:inline-block;margin-top:8px;padding:6px 14px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;text-decoration:none;border-radius:4px;margin-right:6px}
.meta{text-align:right;font-size:11px;color:#aaa}
.meta strong{color:#888;text-transform:uppercase;letter-spacing:1px;display:block;font-size:11px;margin-bottom:3px}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toggle{display:inline-flex;border-radius:8px;overflow:hidden;border:1.5px solid #1a1a2e}
.toggle button{padding:10px 22px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:#555;transition:all .15s}
.toggle button.active{background:#1a1a2e;color:#fff}
.count{margin-left:auto;font-size:12px;color:#888}
.export-btn{padding:8px 14px;font-size:12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid #1e7e34;background:#217346;color:#fff;font-weight:600}
.print-btn{padding:8px 14px;font-size:12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid #1a1a2e;background:#1a1a2e;color:#fff;font-weight:600}
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:600px}
thead th{background:#1a1a2e;color:#aaa;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:11px 16px;text-align:left;white-space:nowrap}
tbody td{padding:11px 16px;border-top:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tbody tr:nth-child(even){background:#fafaf8}
tbody tr:hover{background:#eef3ff}
.rk{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#bbb}
.rk.elite{font-size:22px;color:#e63946}
.rk.top{color:#1a1a2e}
.nm{font-weight:700;color:#1a1a2e;font-size:14px}
.tm{font-size:11px;color:#888}
.bye{text-align:center;color:#555;font-weight:500}
.pos-badge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block}
.k-badge{background:#e8eaf6;color:#283593;border:1px solid #7986cb}
.d-badge{background:#efebe9;color:#4e342e;border:1px solid #a1887f}
.pts{font-weight:600;color:#1a1a2e}
.note{font-size:12px;color:#666;line-height:1.5}
.note-mob{display:none}
.footer{margin-top:16px;font-size:11px;color:#bbb;text-align:center}
@media print{
body{background:#fff;padding:0}
.controls .export-btn,.controls .print-btn,.navpills{display:none!important}
#app{max-width:7in;margin:0 auto}
thead th{background:#fff!important;color:#000;border-bottom:2px solid #000;font-size:8px;padding:5px 8px}
tbody td{padding:4px 8px;font-size:9.5px}
.pos-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
table{min-width:0}.table-wrap{border:1px solid #bbb;overflow:visible}
tbody tr{break-inside:avoid}
.logo{font-size:24px}.subtitle{font-size:12px}
}
@media(max-width:640px){.note{display:none}.note-mob{display:none}}
</style>
</head>
<body>
<div id="app">
<div class="header">
<div>

</div>

</div>

</div>

<script>

{r:2,n:"Denver Broncos",t:"DEN",bye:10,pts:132,note:"Loaded secondary and a relentless front; a weekly sack-and-turnover threat."},

];

let mode="K";
function data(){return mode==="K"?KICKERS:DEFENSES;}

function render(){
const isK=mode==="K";
document.getElementById("thead").innerHTML=`<tr><th>Rank</th><th>${isK?"Kicker":"Defense"}</th><th>Pos</th><th style="text-align:center">Bye</th><th>Proj Pts</th><th class="note-col">Outlook</th></tr>`;
document.getElementById("tbody").innerHTML=data().map(x=>{
const rc=x.r<=5?"elite":x.r<=10?"top":"";
return `<tr>
<td><span class="rk ${rc}">${x.r}</span></td>
<td><div class="nm">${x.n}</div><div class="tm">${x.t}</div></td>
<td><span class="pos-badge ${isK?'k-badge':'d-badge'}">${isK?'K':'DST'}</span></td>
<td class="bye">${x.bye}</td>
<td class="pts">${x.pts.toFixed(1)}</td>
<td class="note">${x.note}</td>
</tr>`;
}).join("");
document.getElementById("count").textContent=data().length+(isK?" kickers":" defenses");
}

function exportCSV(){
const isK=mode==="K";
const esc=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
const head=["Rank",isK?"Kicker":"Defense","Team","Pos","Bye","2026 Proj Pts","Outlook"];
const lines=[head.map(esc).join(",")].concat(data().map(x=>[x.r,x.n,x.t,isK?"K":"DST",x.bye,x.pts,x.note].map(esc).join(",")));
const blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
const a=document.createElement("a");a.href=URL.createObjectURL(blob);
a.download=isK?"fantasymaxxing-2026-kickers-top20.csv":"fantasymaxxing-2026-defenses-top25.csv";
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

document.querySelectorAll("#toggle button").forEach(b=>b.addEventListener("click",()=>{
mode=b.dataset.v;
document.querySelectorAll("#toggle button").forEach(x=>x.classList.toggle("active",x===b));
render();
}));
document.getElementById("export-btn").addEventListener("click",exportCSV);
document.getElementById("updated").textContent=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
render();
</script>
</body>
</html>
